<!doctype html>
<html lang="en" dir="auto">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Algae-Market — Algae</title>
<style>
  :root{
    --bg:#0e1111; --card:#151a1a; --muted:#8aa29e; --text:#eef3f2; --brand:#39d98a; --brand-2:#2bb673; --danger:#ff5c6c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;background:linear-gradient(180deg,#0c0f0f,#0f1313);}
  header{position:sticky;top:0;background:rgba(42, 44, 44, 0.9);backdrop-filter:blur(8px);z-index:10;border-bottom:1px solid #1d2323}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .nav{display:flex;align-items:center;gap:16px;justify-content:space-between;color:var(--text)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700}
  .logo i{width:28px;height:28px;border-radius:8px;background:radial-gradient(120% 120% at 20% 20%,#55ffa8,transparent 60%),radial-gradient(120% 120% at 80% 80%,#2bb673,transparent 60%),#1a221f;box-shadow:0 0 24px rgba(57,217,138,.35) inset}
  .tag{font-size:12px;color:var(--muted)}
  .btn{cursor:pointer;border:none;border-radius:12px;padding:10px 14px;background:var(--brand);color:#052d1b;font-weight:700; transition: background 0.2s;}
  .btn:hover{background:var(--brand-2)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid #2a3434}
  .btn.danger{background:var(--danger);color:#2a0a0e}
  main .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
  .card{background:var(--card);color:var(--text);border:1px solid #1d2323;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .card img{width:100%;height:160px;object-fit:cover;background:#0b0f0f}
  .card .pad{padding:14px;display:flex;flex-direction:column;gap:8px}
  .muted{color:var(--muted);font-size:14px}
  .drawer{position:fixed;right:0;top:0;height:100%;width:420px;max-width:95vw;background:var(--card);border-left:1px solid #1d2323;transform:translateX(100%);transition:.25s ease;z-index:100}
  .drawer.open{transform:translateX(0)}
  .drawer header{position:sticky;top:0;background:var(--card)}
  .drawer .content{padding:16px;height:calc(100% - 64px);overflow:auto;display:flex;flex-direction:column;gap:16px}
  .cart-item{display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:center;border:1px solid #ffffff;border-radius:12px;padding:8px}
  .cart-item img{width:64px;height:64px;object-fit:cover;border-radius:8px}
  .qty{display:flex;align-items:center;background:#0f1313;border:1px solid #1f2525;border-radius:8px}
  .qty button{background:transparent;color:var(--text);border:none;padding:6px 10px;cursor:pointer}
  .qty input{width:40px;text-align:center;background:transparent;color:var(--text);border:none}
  .total{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #1d2323;margin-top:8px;color:var(--text)}
  form.checkout{display:flex;flex-direction:column;gap:10px;background:#101515;border:1px solid #1d2323;padding:12px;border-radius:12px}
  form.checkout input, form.checkout textarea, form.checkout select{width:100%;padding:10px;border-radius:10px;border:1px solid #1f2525;background:#0c1010;color:var(--text); font-family: inherit;}
  .inline{display:flex;gap:10px}
  .inline>*{flex:1}
  .alert{padding:10px;border-radius:10px;background:#0f1412;border:1px solid #1a2a23;color:#94d6b4; text-align: center;}
  .confirm{background:rgba(24,34,30,.9);border:1px solid #20352c;color:#baf3d0;padding:12px;border-radius:12px; text-align: center;}
  @media (max-width:520px){.inline{flex-direction:column}}
  .row{display:flex;gap:8px;align-items:center;justify-content:space-between}
  
.drawer .cart-item{
  background:#fff;
  color:#0e1111;
  border:1px solid #e5e7eb;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.error { color: var(--danger, #ff5c6c); font-size: 12px; display:block; margin-top:6px; }

.drawer .cart-item .muted{ color:#444; }

.drawer .cart-item .qty{
  background:#ffffff;
  border:1px solid #e5e7eb;
}
.drawer .cart-item .qty button,
.drawer .cart-item .qty input{ color:#0e1111; }
.drawer .cart-item .qty input{ background:transparent; }

.drawer .cart-item > div:last-child > div:first-child{ color:#0e1111; font-weight: bold;}
.drawer .cart-item img{ filter:none; opacity:1; }

#productGrid.single {
  max-width: 380px;
  margin-inline: auto;
  grid-template-columns: 1fr;
  justify-items: center;
}

#productGrid .card {
  width: 100%;
  max-width: 360px;
}

#productGrid .card img { height: 140px; }

</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <div class="logo"> <img src="logo.png" alt="Logo" style="height: 28px;">Algae-Market <span class="tag"></span></div>
    <div style="display:flex;gap:8px">
      <button class="btn ghost" id="openCart">العربة | Cart (<span id="cartCount">0</span>)</button>
    </div>
  </div>
</header>

<main class="wrap" style="padding:20px 16px 60px">
  <section style="margin:8px 0 20px;color:var(--text); text-align: center;">
    <h1 style="margin:.2em 0">طحالب حيوية | Algae Biomass</h1>
    <p class="muted"></p>
  </section>

  <section class="grid" id="productGrid"></section>
</main>

<div class="drawer" id="cartDrawer" aria-hidden="true">
  <header class="wrap nav" style="padding:12px 16px">
    <strong>🧺 عربة التسوق | Your Cart</strong>
    <button class="btn ghost" id="closeCart">إغلاق | Close</button>
  </header>
  <div class="content">
    <div id="cartList" style="display:flex;flex-direction:column;gap:10px"></div>

    <div class="total">
      <div><strong>المجموع الفرعي | Subtotal</strong></div>
      <div><strong id="subtotal">EGP 0.00</strong></div>
    </div>

    <div class="alert">
      طريقة الدفع: <strong>الدفع عند الاستلام</strong> فقط.<br>
      <span style="font-size: 0.9em; opacity: 0.8;">Payment method: <strong>Cash on Delivery</strong> only.</span>
    </div>

    <form class="checkout" id="checkoutForm">
      <div class="inline">
        <input required name="name" placeholder="الاسم بالكامل | Full name" />
        <input required name="phone" placeholder="رقم الهاتف (واتساب) | Phone (WhatsApp)" />
      </div>
      <div class="inline">
        <input required name="city" placeholder="المدينة | City" />
      </div>
      <textarea required name="address" rows="3" placeholder="العنوان بالتفصيل (الشارع، المبنى، الدور، علامة مميزة) | Full address"></textarea>
      <input name="notes" placeholder="ملاحظات (اختياري) | Notes (optional)" />
      <div class="inline">
        <button class="btn" type="submit" id="placeOrderBtn" style="width: 100%; font-size: 1.05em;">اطلب الآن عبر واتساب | Order Now via WhatsApp</button>
      </div>
      <div id="confirmBox" class="confirm" style="display:none" aria-live="polite"></div>
    </form>
  </div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const BUSINESS_WHATSAPP = "201070185284"; // Updated WhatsApp Number
const CURRENCY          = "EGP";

/* =========================
   PRODUCTS
========================= */
const PRODUCTS = [
  {
    id: "POWDER-KG",
    name: "Chlorella Dried Powder - (كلوريلا بودره مجففه) not for human consumption",
    img: "PHOTO-2026-03-25-00-38-24.jpg",
    variants: [
      { id:"50g",  label:"50 جم | 50g",  unit:"g",  qty:50,  price: 100 },
      { id:"100g", label:"100 جم | 100g", unit:"g",  qty:100, price: 150 },
      { id:"250g", label:"250 جم | 250g", unit:"g",  qty:250, price: 310 },
      { id:"500g", label:"500 جم | 500g", unit:"g",  qty:500, price: 540 },
      { id:"1kg",  label:"1 كجم | 1kg",  unit:"kg", qty:1,   price: 930 },
      { id:"5kg",  label:"5 كجم | 5kg",  unit:"kg", qty:5,   price: 4500 }
    ]
  }
];

const $  = sel => document.querySelector(sel);
const fmt = n => `${CURRENCY} ${Number(n||0).toFixed(2)}`;
function productById(pid){ return PRODUCTS.find(p=>p.id===pid); }
function variantById(product, vid){ return product.variants.find(v=>v.id===vid); }

/* =========================
   STATE + PERSISTENCE
========================= */
const state = {
  cart: JSON.parse(localStorage.getItem("cart") || "[]")
};
function persist(){ localStorage.setItem("cart", JSON.stringify(state.cart)); }

/* =========================
   CART OPS
========================= */
function addToCart(pid, vid){
  const found = state.cart.find(i=>i.pid===pid && i.vid===vid);
  if(found){
    found.qty += 1;
  } else {
    state.cart.push({ pid, vid, qty:1 });
  }
  persist(); 
  renderCart(); 
  pulse($('#openCart'));

  // Automatically open cart when item is added
  const d = $("#cartDrawer");
  d.classList.add("open");
  d.setAttribute("aria-hidden","false");
}

function removeFromCart(pid, vid){
  state.cart = state.cart.filter(i=>!(i.pid===pid && i.vid===vid));
  persist(); renderCart();
}

function updateQty(pid, vid, n){
  const item = state.cart.find(i=>i.pid===pid && i.vid===vid);
  if(!item) return;
  item.qty = Math.max(1, n|0);
  persist(); renderCart();
}

function subtotal(){
  return state.cart.reduce((s,i)=>{
    const p = productById(i.pid);
    const v = variantById(p, i.vid);
    return s + (v.price * i.qty);
  }, 0);
}
function pulse(el){ el.style.transform='scale(1.05)'; setTimeout(()=>el.style.transform='',150); }

/* =========================
   RENDER — PRODUCTS
========================= */
function renderProducts(){
  const grid = $("#productGrid");
  grid.innerHTML = PRODUCTS.map(p => {
    const options = p.variants.map(v=>`<option value="${v.id}">${v.label} — ${fmt(v.price)}</option>`).join('');
    const btnId = `btn-${p.id}`;
    const selId = `sel-${p.id}`;

    return `
    <article class="card">
      <img src="${p.img}" alt="${p.name}" loading="lazy"/>
      <div class="pad">
        <div class="row">
          <div>
            <div style="font-weight:700">${p.name}</div>
            <div class="muted">ID: ${p.id}</div>
          </div>
        </div>
        <select id="${selId}" aria-label="Choose quantity">
          ${options}
        </select>
        <button id="${btnId}" class="btn" onclick="addToCart('${p.id}', document.getElementById('${selId}').value)">أضف إلى العربة | Add to Cart</button>
      </div>
    </article>`;
  }).join('');
}

/* =========================
   RENDER — CART
========================= */
function renderCart(){
  $("#cartCount").textContent = state.cart.reduce((s,i)=>s+i.qty,0);
  const list = $("#cartList");
  if(state.cart.length===0){
    list.innerHTML = `<div class="muted" style="text-align:center; padding: 20px 0;">عربة التسوق فارغة<br>Your cart is empty.</div>`;
    $("#subtotal").textContent = fmt(0);
    return;
  }
  list.innerHTML = state.cart.map(i=>{
    const p = productById(i.pid);
    const v = variantById(p, i.vid);
    const line = v.price * i.qty;
    return `
      <div class="cart-item">
        <img src="${p.img}" alt="${p.name}"/>
        <div>
          <div style="font-weight:700; font-size: 0.9em; margin-bottom: 4px;">${p.name}</div>
          <div class="muted" style="font-size: 0.8em; margin-bottom: 6px;">النوع | Variant: ${v.label} <br> ${fmt(v.price)} للوحدة | each</div>
          <div class="qty" aria-label="quantity of packs" style="display:inline-flex;">
            <button onclick="updateQty('${i.pid}','${i.vid}', ${i.qty-1})">−</button>
            <input value="${i.qty}" oninput="updateQty('${i.pid}','${i.vid}', this.value)" />
            <button onclick="updateQty('${i.pid}','${i.vid}', ${i.qty+1})">+</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div>${fmt(line)}</div>
          <button class="btn danger" style="padding: 6px 10px; font-size: 12px;" onclick="removeFromCart('${i.pid}','${i.vid}')">إزالة | Remove</button>
        </div>
      </div>
    `;
  }).join('');
  $("#subtotal").textContent = fmt(subtotal());
}

/* =========================
   CHECKOUT (WHATSAPP ONLY)
========================= */
function orderId(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `GB-${String(d.getFullYear()).slice(2)}${pad(d.getMonth()+1)}${pad(d.getDate())}-${Math.random().toString(36).slice(2,6).toUpperCase()}`;
}

function orderPayload(form){
  const data = Object.fromEntries(new FormData(form));
  const items = state.cart.map(i=>{
    const p = productById(i.pid);
    const v = variantById(p, i.vid);
    return {
      productName: p.name,
      variantLabel: v.label,
      priceEach: v.price,
      packs: i.qty,
      lineTotal: v.price * i.qty
    };
  });
  const total = items.reduce((s,x)=>s+x.lineTotal,0);
  return {
    id: orderId(),
    items, total,
    customer: {
      name: data.name, phone: data.phone, city: data.city,
      address: data.address, notes: data.notes || ""
    },
    payment: "COD"
  };
}

function encodeMultiline(obj){
  const lines = [];
  const money = n=>Number(n||0).toFixed(2);
  lines.push(`📦 *New Order ID: ${obj.id}*`);
  lines.push(`Payment: ${obj.payment}`);
  lines.push(``);
  lines.push(`*Items:*`);
  obj.items.forEach(x=>{
    lines.push(`- ${x.productName} \n  ${x.variantLabel} x${x.packs} — ${CURRENCY} ${money(x.lineTotal)}`);
  });
  lines.push(``);
  lines.push(`*Subtotal: ${CURRENCY} ${money(obj.total)}*`);
  lines.push(``);
  lines.push(`*Customer Details:*`);
  lines.push(`Name: ${obj.customer.name}`);
  lines.push(`Phone: ${obj.customer.phone}`);
  lines.push(`City: ${obj.customer.city}`);
  lines.push(`Address: ${obj.customer.address}`);
  if(obj.customer.notes) lines.push(`Notes: ${obj.customer.notes}`);
  return lines.join('\n');
}

function openWhatsApp(text){
  const url = `https://wa.me/${BUSINESS_WHATSAPP}?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
}

function clearCart(){ state.cart = []; persist(); renderCart(); }

/* =========================
   WIRING
========================= */
renderProducts();
renderCart();

if (PRODUCTS.length === 1) {
    document.getElementById('productGrid').classList.add('single');
}

$("#openCart").addEventListener("click", ()=>{
  const d = $("#cartDrawer");
  d.classList.add("open");
  d.setAttribute("aria-hidden","false");
});

$("#closeCart").addEventListener("click", ()=>{
  const d = $("#cartDrawer");
  d.classList.remove("open");
  d.setAttribute("aria-hidden","true");
});

$("#checkoutForm").addEventListener("submit", (e)=>{
  e.preventDefault();
  if(state.cart.length===0){ 
    alert("عربة التسوق فارغة | Your cart is empty."); 
    return; 
  }

  const btn = document.getElementById("placeOrderBtn");
  btn.textContent = "جاري فتح واتساب... | Opening WhatsApp...";
  btn.disabled = true;

  const order = orderPayload(e.target);
  const text  = encodeMultiline(order);

  // Open WhatsApp with the order details
  openWhatsApp(text);

  // Provide confirmation feedback and clear the cart
  const box = $("#confirmBox");
  box.style.display='block';
  box.innerHTML = "✅ جاري تحويلك إلى واتساب لإتمام الطلب!<br><span style='font-size:0.8em;'>Redirecting you to WhatsApp to complete your order!</span>";
  
  clearCart();
  
  setTimeout(() => {
    btn.textContent = "اطلب الآن عبر واتساب | Order Now via WhatsApp";
    btn.disabled = false;
    $("#closeCart").click();
    box.style.display='none';
  }, 4000);
});
</script>
</body>
</html>
